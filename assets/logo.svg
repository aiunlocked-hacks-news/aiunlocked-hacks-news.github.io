<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: Neural brain in circle -->
  <circle cx="56" cy="60" r="48" fill="url(#g1)" opacity="0.12"/>
  <circle cx="56" cy="60" r="40" fill="url(#g1)" opacity="0.08"/>

  <!-- Brain circuit paths -->
  <g stroke="url(#g2)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Left hemisphere -->
    <path d="M36,45 C36,35 46,28 56,28"/>
    <path d="M33,60 C28,55 30,42 40,38"/>
    <path d="M36,75 C30,72 28,63 33,60"/>
    <path d="M56,92 C46,92 36,85 36,75"/>
    <!-- Right hemisphere -->
    <path d="M56,28 C66,28 76,35 76,45"/>
    <path d="M76,45 C82,50 80,63 76,68"/>
    <path d="M76,68 C80,75 76,85 68,88"/>
    <path d="M68,88 C63,92 56,92 56,92"/>
    <!-- Cross connections -->
    <path d="M42,42 L56,52 L70,42"/>
    <path d="M40,65 L56,58 L72,65"/>
    <path d="M45,80 L56,72 L67,80"/>
    <!-- Central spine -->
    <path d="M56,32 L56,88"/>
  </g>

  <!-- Neural nodes -->
  <g fill="url(#g2)">
    <circle cx="56" cy="28" r="3.5"/>
    <circle cx="56" cy="52" r="3"/>
    <circle cx="56" cy="72" r="3"/>
    <circle cx="56" cy="88" r="3.5"/>
    <circle cx="36" cy="45" r="2.8"/>
    <circle cx="76" cy="45" r="2.8"/>
    <circle cx="33" cy="60" r="2.5"/>
    <circle cx="76" cy="68" r="2.5"/>
    <circle cx="36" cy="75" r="2.8"/>
    <circle cx="68" cy="88" r="2.5"/>
    <circle cx="42" cy="42" r="2.2"/>
    <circle cx="70" cy="42" r="2.2"/>
    <circle cx="40" cy="65" r="2.2"/>
    <circle cx="72" cy="65" r="2.2"/>
    <circle cx="45" cy="80" r="2.2"/>
    <circle cx="67" cy="80" r="2.2"/>
  </g>

  <!-- Unlock indicator: small open padlock -->
  <g transform="translate(80, 18) scale(0.55)">
    <rect x="2" y="20" width="28" height="22" rx="4" fill="url(#g1)"/>
    <path d="M9,20 V14 C9,6 23,6 23,14" stroke="url(#g2)" stroke-width="4" fill="none" stroke-linecap="round" transform="rotate(-15, 16, 14)"/>
    <circle cx="16" cy="31" r="3" fill="white" opacity="0.9"/>
    <rect x="14.5" y="31" width="3" height="5" rx="1" fill="white" opacity="0.9"/>
  </g>

  <!-- Text: AI -->
  <text x="118" y="78" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="800" fill="url(#g1)" letter-spacing="-1">AI</text>

  <!-- Text: Unlocked -->
  <text x="195" y="78" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="800" letter-spacing="-1">
    <tspan fill="currentColor">Unlocked</tspan>
  </text>
</svg>
