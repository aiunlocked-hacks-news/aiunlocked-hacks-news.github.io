<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(129,140,248,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect width="400" height="400" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="120" fill="rgba(99,102,241,0.08)"/>
  <circle cx="320" cy="320" r="100" fill="rgba(139,92,246,0.08)"/>

  <!-- Brain circuit - centered -->
  <g transform="translate(200,170)" stroke="url(#g1)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M-32,-25 C-32,-40 -16,-50 0,-50"/>
    <path d="M0,-50 C16,-50 32,-40 32,-25"/>
    <path d="M-38,0 C-45,-8 -42,-23 -32,-30"/>
    <path d="M32,-25 C42,-18 40,-3 34,5"/>
    <path d="M-32,25 C-40,20 -42,8 -38,0"/>
    <path d="M34,5 C40,15 35,30 26,35"/>
    <path d="M0,50 C-16,50 -32,40 -32,25"/>
    <path d="M26,35 C18,42 8,45 0,50"/>
    <path d="M-22,-28 L0,-14 L22,-28"/>
    <path d="M-26,5 L0,-4 L26,5"/>
    <path d="M-18,32 L0,22 L18,32"/>
    <path d="M0,-46 L0,46"/>
  </g>

  <!-- Neural nodes -->
  <g transform="translate(200,170)" fill="url(#g1)">
    <circle cx="0" cy="-50" r="5"/>
    <circle cx="0" cy="-14" r="4"/>
    <circle cx="0" cy="22" r="4"/>
    <circle cx="0" cy="46" r="5"/>
    <circle cx="-32" cy="-25" r="4"/>
    <circle cx="32" cy="-25" r="4"/>
    <circle cx="-38" cy="0" r="3.5"/>
    <circle cx="34" cy="5" r="3.5"/>
    <circle cx="-32" cy="25" r="4"/>
    <circle cx="26" cy="35" r="3.5"/>
    <circle cx="-22" cy="-28" r="3"/>
    <circle cx="22" cy="-28" r="3"/>
    <circle cx="-26" cy="5" r="3"/>
    <circle cx="26" cy="5" r="3"/>
    <circle cx="-18" cy="32" r="3"/>
    <circle cx="18" cy="32" r="3"/>
  </g>

  <!-- Brand text -->
  <text x="200" y="290" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="38" font-weight="800" fill="white" letter-spacing="-0.5">
    <tspan>AI </tspan><tspan fill="url(#g1)">Unlocked</tspan>
  </text>
  <text x="200" y="318" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="rgba(148,163,184,0.8)" letter-spacing="3" text-transform="uppercase">YOUR DAILY AI NEWS</text>
</svg>
